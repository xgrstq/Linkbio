<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body{ font-family:'Press Start 2P', cursive; background:#2f2f2f; }
        .gameboy{ position:relative; background:linear-gradient(145deg,#d9d9c8,#c8c8b5); box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2), inset 4px 4px 8px rgba(255,255,255,0.4), 0 10px 30px rgba(0,0,0,0.6); }
        .screen-shell{ background:#8bac0f; padding:20px; border-radius:6px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .screen-text{ color:#0f380f; font-size:10px; line-height:1.8; height:200px; overflow: hidden; }
        
        /* Animasi LED Kelap-Kelip */
        @keyframes ledBlink {
            0%, 49% { background: red; box-shadow: 0 0 8px red; }
            50%, 100% { background: #500; box-shadow: none; }
        }
        .led { width: 10px; height: 10px; border-radius: 9999px; animation: ledBlink 2s infinite; }

        /* Tombol Power Timbul */
        .btn-power {
            font-size: 8px; color: #444; cursor: pointer; padding: 2px 5px; border-radius: 4px;
            background: #cccbc0; box-shadow: 1px 1px 0px #888, -1px -1px 0px #fff;
            transition: 0.1s; user-select: none;
        }
        .btn-power:active { box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3); transform: translate(1px, 1px); }

        @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0} }
        .loading{ animation:blink 1s infinite; }
        .menu-item{ position:relative; padding-left:14px; }
        .menu-item.selected::before{ content:">"; position:absolute; left:0; animation:cursorPop 0.15s ease; }
        @keyframes cursorPop{ 0%{transform:scale(0.6);opacity:0.6} 100%{transform:scale(1.2);opacity:1} }
        
        .dpad button{ background:#3a3a3a; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.7); }
        .btn-round{ width:60px; height:60px; border-radius:9999px; color:white; font-size:16px; box-shadow: inset -4px -4px 6px rgba(0,0,0,0.6), 0 6px 10px rgba(0,0,0,0.5); }
        .small-btn{ background:#777; padding:6px 18px; font-size:8px; border-radius:20px; }
        .speaker-line{ height:4px; background:#777; margin:4px 0; border-radius:4px; }
        canvas { background: #9dbb26; display: block; margin: 0 auto; border: 1px solid #0f380f; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="gameboy w-[360px] rounded-2xl p-6">
    <div class="screen-shell mb-6">
        <div class="screen-text" id="screen"></div>
    </div>

    <div class="flex items-center mb-4">
        <div class="flex items-center gap-2">
            <div class="led"></div>
            <span class="btn-power" onclick="window.open('https://youtu.be/QDia3e12czc?si=Kj-rHlo6XPSThUAQ://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank')">POWER</span>
        </div>
        <div class="ml-auto text-[8px] text-gray-600 tracking-widest">© GRH 2026</div>
    </div>

    <div class="flex justify-between items-start">
        <div class="dpad grid grid-cols-3 gap-1 w-28">
            <div></div><button id="btn-up" class="h-10"></button><div></div>
            <button id="btn-left" class="h-10"></button><div class="bg-[#2e2e2e]"></div><button id="btn-right" class="h-10"></button>
            <div></div><button id="btn-down" class="h-10"></button><div></div>
        </div>
        <div class="relative w-40 h-32">
            <button id="btn-b" class="btn-round bg-purple-700 absolute bottom-10 left-6">B</button>
            <button id="btn-a" class="btn-round bg-purple-700 absolute bottom-0 right-6">A</button>
        </div>
    </div>
    <div class="flex justify-center mt-6"><button id="btn-start" class="small-btn">HOME</button></div>
    <div class="mt-8">
        <div class="speaker-line w-24 ml-auto"></div>
        <div class="speaker-line w-20 ml-auto"></div>
        <div class="speaker-line w-16 ml-auto"></div>
    </div>
</div>

<script>
// --- DATA ASLI ---
const links = {
    main: ["preset", "https://500px.com/p/matcha_a", "https://saweria.co/Mtchcyn", "https://github.com/xgrstq", "https://discord.com/users/1133384562421010523", "games"],
    preset: [
        "https://drive.google.com/file/d/1Bs4M2H9lXtxrvRAWqawEz2U4akMIxt2h/view?usp=drivesdk",
        "https://drive.google.com/file/d/16ZZfGMMsoUrbT-xIWneySB3Jkom1Q8gk/view?usp=drivesdk"
    ],
    games: ["snake"]
};

let current = 0;
let currentMenu = "main";
let isLoading = false;
let activeGame = null;

// --- SNAKE LOGIC ---
let snake, food, dx, dy, score, gameInterval;
function initSnake() {
    activeGame = "snake";
    snake = [{x: 80, y: 70}]; dx = 10; dy = 0; score = 0;
    const screen = document.getElementById("screen");
    screen.innerHTML = `<div style="text-align:center">SNAKE<br>SCORE: <span id="score">0</span></div><canvas id="snakeCanvas" width="160" height="120"></canvas><div style="font-size:7px;margin-top:5px">B=EXIT</div>`;
    spawnFood();
    gameInterval = setInterval(updateSnake, 150);
}
function spawnFood() { food = { x: Math.floor(Math.random()*16)*10, y: Math.floor(Math.random()*12)*10 }; }
function updateSnake() {
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };
    if (head.x<0 || head.x>=160 || head.y<0 || head.y>=120 || snake.some(s=>s.x===head.x && s.y===head.y)) {
        clearInterval(gameInterval); alert("GAME OVER! SCORE: " + score); exitGame(); return;
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) { score+=10; document.getElementById("score").innerText=score; spawnFood(); } else { snake.pop(); }
    const canvas = document.getElementById("snakeCanvas");
    if(!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,160,120); ctx.fillStyle="#0f380f";
    snake.forEach(s=>ctx.fillRect(s.x,s.y,9,9)); ctx.fillStyle="#306230"; ctx.fillRect(food.x,food.y,9,9);
}
function exitGame() { clearInterval(gameInterval); activeGame = null; render(); }

// --- RENDER ENGINE (PERBAIKAN LN 138) ---
function render(){
    if(isLoading || activeGame) return;
    const screen = document.getElementById("screen");
    let content = "";

    if(currentMenu === "main"){
        const items = ["LIGHTROOM PRESET", "500PX", "SAWERIA", "GITHUB", "DISCORD", "GAMES"];
        content += "GRH v3.2<br><br>";
        content += items.map((item, i) => 
            `<div class="menu-item ${i === current ? 'selected' : ''}">${item}</div>`
        ).join("");
        content += "<br>A=SELECT B=BACK";
    }

    if(currentMenu === "preset"){
        content += "LIGHTROOM PRESET<br><br>";
        if(current === 0){
            content += `<div class="menu-item selected">SUMMER GROWTH</div>ORGANIC • WARM • VIBRANT<br><br>A=DOWNLOAD B=BACK`;
        } else {
            content += `<div class="menu-item selected">WARM GROWTH</div>ORGANIC • WARM DAYLIGHT • PEACEFUL<br><br>A=DOWNLOAD B=BACK`;
        }
    }

    if(currentMenu === "games"){
        content += "MINI GAMES<br><br><div class='menu-item selected'>SNAKE CLASSIC</div><br>A=PLAY B=BACK";
    }

    screen.innerHTML = content;
}

function showLoading(callback){
    const screen = document.getElementById("screen");
    isLoading = true;
    screen.innerHTML = `<div class="loading">PLEASE WAIT<br>LOADING DATA.....</div>`;
    setTimeout(()=>{ isLoading = false; callback(); },1000);
}

function move(dir){
    if(activeGame) return;
    const max = currentMenu==="main"? 6 : (currentMenu==="preset"? 2 : 1);
    current = (current + dir + max) % max;
    render();
}

function selectItem(){
    if(activeGame) return;
    const target = links[currentMenu][current];
    if(target === "preset" || target === "games"){
        showLoading(()=>{ currentMenu=target; current=0; render(); });
    } else if(target === "snake"){
        showLoading(()=> initSnake());
    } else {
        window.open(target, "_blank");
    }
}

// --- CONTROLS ---
document.getElementById("btn-up").onclick = () => activeGame==="snake" ? (dy===0 && (dx=0,dy=-10)) : move(-1);
document.getElementById("btn-down").onclick = () => activeGame==="snake" ? (dy===0 && (dx=0,dy=10)) : move(1);
document.getElementById("btn-left").onclick = () => activeGame==="snake" && dx===0 && (dx=-10,dy=0);
document.getElementById("btn-right").onclick = () => activeGame==="snake" && dx===0 && (dx=10,dy=0);
document.getElementById("btn-a").onclick = selectItem;
document.getElementById("btn-b").onclick = () => activeGame ? exitGame() : (currentMenu!=="main" && (currentMenu="main",current=0,render()));
document.getElementById("btn-start").onclick = () => { if(activeGame) exitGame(); currentMenu="main"; current=0; render(); };

render();
</script>
</body>
</html>
